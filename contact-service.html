<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Now – Om Bharat Studio</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ---------- GLOBAL (same dark theme) ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #f0ece7;
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }
    a {
      text-decoration: none;
    }

    /* 3D Particle Background (fixed) */
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    /* Static Navbar (matching main site) */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 3rem;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212, 163, 115, 0.15);
      z-index: 1000;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #d4a373, #f0d5b0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .navbar nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
    }
    .navbar nav ul li a {
      font-size: 0.95rem;
      font-weight: 500;
      color: #c5bcb3;
      transition: color 0.3s ease;
      padding-bottom: 4px;
      border-bottom: 2px solid transparent;
    }
    .navbar nav ul li a:hover {
      color: #f0ece7;
      border-bottom-color: #d4a373;
    }

    /* ---------- CONTACT / BOOK SECTION ---------- */
    .book-section {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8rem 2rem 4rem;
      background: rgba(10, 10, 10, 0.6);
      backdrop-filter: blur(2px);
    }
    .book-container {
      max-width: 700px;
      width: 100%;
      text-align: center;
    }
    .book-container h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #f0ece7, #d4a373);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .book-container .sub {
      font-size: 1.2rem;
      color: #a89f97;
      margin-bottom: 3rem;
      letter-spacing: 1px;
    }

    /* Two big call-to-action cards */
    .action-grid {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .action-card {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: rgba(20, 17, 14, 0.8);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(212, 163, 115, 0.2);
      border-radius: 20px;
      padding: 1.8rem 2.5rem;
      transition: all 0.3s ease;
    }
    .action-card:hover {
      transform: scale(1.02);
      border-color: #d4a373;
      box-shadow: 0 12px 40px rgba(212, 163, 115, 0.15);
    }
    .action-card .icon {
      font-size: 2.8rem;
      line-height: 1;
    }
    .action-card .text {
      text-align: left;
    }
    .action-card .text .label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #a89f97;
      margin-bottom: 0.2rem;
    }
    .action-card .text .value {
      font-size: 1.4rem;
      font-weight: 600;
      color: #f0ece7;
    }
    .action-card .text .value small {
      font-weight: 300;
      font-size: 0.9rem;
      color: #d4a373;
    }

    .action-card.whatsapp {
      border-left: 6px solid #25d366;
    }
    .action-card.whatsapp:hover {
      background: rgba(37, 211, 102, 0.1);
    }
    .action-card.call {
      border-left: 6px solid #d4a373;
    }
    .action-card.call:hover {
      background: rgba(212, 163, 115, 0.1);
    }

    .back-home {
      display: inline-block;
      margin-top: 3rem;
      padding: 0.8rem 2.5rem;
      font-size: 0.95rem;
      font-weight: 500;
      color: #a89f97;
      border: 1px solid rgba(212, 163, 115, 0.25);
      border-radius: 50px;
      transition: all 0.3s ease;
    }
    .back-home:hover {
      color: #f0ece7;
      border-color: #d4a373;
      background: rgba(212, 163, 115, 0.08);
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 768px) {
      .navbar {
        padding: 0.8rem 1.5rem;
        flex-wrap: wrap;
      }
      .logo {
        font-size: 1.2rem;
      }
      .navbar nav ul {
        gap: 1rem;
      }
      .navbar nav ul li a {
        font-size: 0.75rem;
      }
      .book-container h1 {
        font-size: 2.5rem;
      }
      .action-card {
        flex-direction: column;
        text-align: center;
        padding: 1.5rem;
      }
      .action-card .text {
        text-align: center;
      }
      .action-card .icon {
        font-size: 2.2rem;
      }
    }
    @media (max-width: 480px) {
      .book-container h1 {
        font-size: 2rem;
      }
      .action-card .text .value {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

  <!-- ========== 3D PARTICLE BACKGROUND ========== -->
  <div id="particle-canvas"></div>

  <!-- ========== STATIC NAVBAR ========== -->
  <header class="navbar">
    <div class="logo">Om Bharat Studio</div>
    <nav>
      <ul>
        <li><a href="index.html#home">Home</a></li>
        <li><a href="index.html#portfolio">Our Work</a></li>
        <li><a href="index.html#services">Services</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- ========== BOOK NOW SECTION ========== -->
  <section class="book-section">
    <div class="book-container">
      <h1>Book Your Session</h1>
      <p class="sub">Choose your preferred way to connect with us</p>

      <div class="action-grid">
        <!-- WhatsApp option -->
        <a href="https://wa.me/917379827374?text=Hi%20Om%20Bharat%20Studio%2C%20I%20want%20to%20book%20a%20service." target="_blank" class="action-card whatsapp">
          <div class="icon">💬</div>
          <div class="text">
            <div class="label">Chat with us</div>
            <div class="value">WhatsApp <small>+91 7379827374</small></div>
          </div>
        </a>

        <!-- Direct Call option -->
        <a href="tel:+917379827374" class="action-card call">
          <div class="icon">📞</div>
          <div class="text">
            <div class="label">Speak instantly</div>
            <div class="value">Direct Call <small>+91 7379827374</small></div>
          </div>
        </a>
      </div>

      <a href="index.html" class="back-home">← Back to Home</a>
    </div>
  </section>

  <!-- ========== THREE.JS FOR 3D PARTICLES ========== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    (function initParticles() {
      const container = document.getElementById('particle-canvas');
      const width = window.innerWidth;
      const height = window.innerHeight;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
      camera.position.z = 30;

      const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      renderer.setSize(width, height);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      const particlesGeometry = new THREE.BufferGeometry();
      const count = 1800;
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);

      for (let i = 0; i < count * 3; i++) {
        positions[i] = (Math.random() - 0.5) * 90;
        colors[i] = 0.8 + Math.random() * 0.2;
        if (i % 3 === 1) colors[i] *= 0.6;
        if (i % 3 === 2) colors[i] *= 0.3;
      }

      particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const particlesMaterial = new THREE.PointsMaterial({
        size: 0.22,
        vertexColors: true,
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending,
      });

      const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
      scene.add(particlesMesh);

      let mouseX = 0,
        mouseY = 0;
      document.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
      });

      function animate() {
        particlesMesh.rotation.y += 0.0004;
        particlesMesh.rotation.x += 0.0001;
        particlesMesh.rotation.y += mouseX * 0.0005;
        particlesMesh.rotation.x += mouseY * 0.0003;
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }
      animate();

      window.addEventListener('resize', () => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      });
    })();
  </script>
</body>
</html>
